<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileTree Component — iOS UI Kit</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts: Syne (display) + DM Mono (code/labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono: ['"DM Mono"', 'monospace'],
          },
          colors: {
            surface: '#FFFFFF',
            canvas:  '#F2F0ED',
          },
          keyframes: {
            fadeSlideIn: {
              '0%':   { opacity: '0', transform: 'translateY(-6px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulse2: {
              '0%,100%': { opacity: '1' },
              '50%':     { opacity: '0.5' },
            },
          },
          animation: {
            'fade-in': 'fadeSlideIn 0.3s cubic-bezier(0.22,1,0.36,1) both',
            'pulse2':  'pulse2 1.4s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <style>
    /* ─── Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Mono', monospace; background: #F2F0ED; }

    /* ─── Smooth expand/collapse via CSS grid ────────── */
    .tree-expand {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tree-expand.open { grid-template-rows: 1fr; }
    .tree-expand > .inner { overflow: hidden; }

    /* ─── Chevron rotation ───────────────────────────── */
    .chevron {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ─── Focus ring (WCAG) ──────────────────────────── */
    [tabindex]:focus-visible {
      outline: 2px solid #EA580C;
      outline-offset: -2px;
      border-radius: 6px;
    }

    /* ─── Scrollbar ──────────────────────────────────── */
    .tree-scroll::-webkit-scrollbar        { width: 5px; }
    .tree-scroll::-webkit-scrollbar-track  { background: transparent; }
    .tree-scroll::-webkit-scrollbar-thumb  { background: #E4E4E7; border-radius: 3px; }
    .tree-scroll::-webkit-scrollbar-thumb:hover { background: #D4D4D8; }

    /* ─── Checkbox tick transition ───────────────────── */
    .tick { transition: stroke-dashoffset 0.18s ease, opacity 0.15s ease; }

    /* ─── Indent guide lines ─────────────────────────── */
    .indent-trail {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 4px;
      width: 1px;
      background: #E4E4E7;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

/* ═══════════════════════════════════════════════════════════
   SAMPLE DATA
═══════════════════════════════════════════════════════════ */
const TREE_DATA = [
  {
    id: 'src', name: 'src', type: 'folder',
    children: [
      {
        id: 'src/components', name: 'components', type: 'folder',
        children: [
          { id: 'src/components/Button.tsx',   name: 'Button.tsx',   type: 'file', ext: 'tsx' },
          { id: 'src/components/Input.tsx',    name: 'Input.tsx',    type: 'file', ext: 'tsx' },
          { id: 'src/components/Modal.tsx',    name: 'Modal.tsx',    type: 'file', ext: 'tsx' },
          { id: 'src/components/Dropdown.tsx', name: 'Dropdown.tsx', type: 'file', ext: 'tsx' },
          { id: 'src/components/Toast.tsx',    name: 'Toast.tsx',    type: 'file', ext: 'tsx' },
        ],
      },
      {
        id: 'src/hooks', name: 'hooks', type: 'folder',
        children: [
          { id: 'src/hooks/useTheme.ts',  name: 'useTheme.ts',  type: 'file', ext: 'ts' },
          { id: 'src/hooks/useAuth.ts',   name: 'useAuth.ts',   type: 'file', ext: 'ts' },
          { id: 'src/hooks/useToast.ts',  name: 'useToast.ts',  type: 'file', ext: 'ts' },
        ],
      },
      {
        id: 'src/styles', name: 'styles', type: 'folder',
        children: [
          { id: 'src/styles/globals.css', name: 'globals.css', type: 'file', ext: 'css' },
          { id: 'src/styles/tokens.css',  name: 'tokens.css',  type: 'file', ext: 'css' },
        ],
      },
      { id: 'src/App.tsx',  name: 'App.tsx',  type: 'file', ext: 'tsx' },
      { id: 'src/main.tsx', name: 'main.tsx', type: 'file', ext: 'tsx' },
    ],
  },
  {
    id: 'public', name: 'public', type: 'folder',
    children: [
      { id: 'public/favicon.svg',  name: 'favicon.svg',  type: 'file', ext: 'svg' },
      { id: 'public/og-image.png', name: 'og-image.png', type: 'file', ext: 'png' },
      { id: 'public/robots.txt',   name: 'robots.txt',   type: 'file', ext: 'txt' },
    ],
  },
  { id: 'package.json',          name: 'package.json',          type: 'file', ext: 'json' },
  { id: 'tsconfig.json',         name: 'tsconfig.json',         type: 'file', ext: 'json' },
  { id: 'vite.config.ts',        name: 'vite.config.ts',        type: 'file', ext: 'ts'   },
  { id: 'tailwind.config.js',    name: 'tailwind.config.js',    type: 'file', ext: 'js'   },
  { id: 'README.md',             name: 'README.md',             type: 'file', ext: 'md'   },
];

/* ═══════════════════════════════════════════════════════════
   EXTENSION → VISUAL CONFIG
═══════════════════════════════════════════════════════════ */
const EXT = {
  tsx:  { color: '#0284C7', bg: '#F0F9FF', ring: '#BAE6FD', label: 'TSX' },
  ts:   { color: '#2563EB', bg: '#EFF6FF', ring: '#BFDBFE', label: 'TS'  },
  js:   { color: '#B45309', bg: '#FFFBEB', ring: '#FDE68A', label: 'JS'  },
  css:  { color: '#7C3AED', bg: '#F5F3FF', ring: '#DDD6FE', label: 'CSS' },
  json: { color: '#C2410C', bg: '#FFF7ED', ring: '#FED7AA', label: 'JSON'},
  md:   { color: '#047857', bg: '#ECFDF5', ring: '#A7F3D0', label: 'MD'  },
  svg:  { color: '#BE185D', bg: '#FDF2F8', ring: '#F9A8D4', label: 'SVG' },
  png:  { color: '#0F766E', bg: '#F0FDFA', ring: '#99F6E4', label: 'PNG' },
  txt:  { color: '#71717A', bg: '#F9FAFB', ring: '#D4D4D8', label: 'TXT' },
  ico:  { color: '#71717A', bg: '#F9FAFB', ring: '#D4D4D8', label: 'ICO' },
};
const extCfg = (ext) => EXT[ext] ?? { color: '#A1A1AA', bg: '#FAFAFA', ring: '#E4E4E7', label: (ext ?? '').slice(0,4).toUpperCase() };

/* ═══════════════════════════════════════════════════════════
   TREE UTILITIES
═══════════════════════════════════════════════════════════ */
function flattenVisible(nodes, expandedSet) {
  const out = [];
  const walk = (list) => {
    list.forEach(n => {
      out.push(n);
      if (n.type === 'folder' && expandedSet.has(n.id) && n.children) walk(n.children);
    });
  };
  walk(nodes);
  return out;
}

function getAllDescendantIds(node) {
  const ids = [];
  if (node.children) node.children.forEach(c => { ids.push(c.id); ids.push(...getAllDescendantIds(c)); });
  return ids;
}

function getLeafIds(node) {
  if (node.type === 'file') return [node.id];
  return (node.children ?? []).flatMap(getLeafIds);
}

function findNode(nodes, id) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const f = findNode(n.children, id); if (f) return f; }
  }
  return null;
}

function findParentId(nodes, targetId, parentId = null) {
  for (const n of nodes) {
    if (n.id === targetId) return parentId;
    if (n.children) {
      const found = findParentId(n.children, targetId, n.id);
      if (found !== undefined) return found;
    }
  }
  return undefined;
}

/* ═══════════════════════════════════════════════════════════
   SVG ICONS
═══════════════════════════════════════════════════════════ */
const ChevronSvg = ({ open }) => (
  <svg className={`chevron${open ? ' open' : ''}`} width="11" height="11"
    viewBox="0 0 11 11" fill="none" aria-hidden="true">
    <path d="M4 2.5L7 5.5L4 8.5" stroke="currentColor" strokeWidth="1.5"
      strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

const FolderSvg = ({ open }) => (
  <svg width="16" height="15" viewBox="0 0 16 15" fill="none" aria-hidden="true"
    className="flex-shrink-0">
    <path
      d="M1.5 3.5C1.5 2.948 1.948 2.5 2.5 2.5H6.379C6.644 2.5 6.896 2.605 7.083 2.793L7.707 3.417C7.895 3.605 8.146 3.71 8.41 3.71H13.5C14.052 3.71 14.5 4.158 14.5 4.71V11.5C14.5 12.052 14.052 12.5 13.5 12.5H2.5C1.948 12.5 1.5 12.052 1.5 11.5V3.5Z"
      fill={open ? '#FDE68A' : '#FEF3C7'}
      stroke="#F59E0B"
      strokeWidth="0.7"
    />
    {open && (
      <path
        d="M1.5 5.5H14.5V11.5C14.5 12.052 14.052 12.5 13.5 12.5H2.5C1.948 12.5 1.5 12.052 1.5 11.5V5.5Z"
        fill="#FCD34D"
        stroke="#F59E0B"
        strokeWidth="0.7"
      />
    )}
  </svg>
);

const FileSvg = ({ ext }) => {
  const { color } = extCfg(ext);
  return (
    <svg width="13" height="16" viewBox="0 0 13 16" fill="none"
      aria-hidden="true" className="flex-shrink-0">
      <path d="M2 1H8.5L12 4.5V15H2V1Z" fill="white" stroke={color} strokeWidth="0.8"/>
      <path d="M8.5 1L12 4.5H8.5V1Z" fill={color} opacity="0.18"/>
      <path d="M8.5 4.5H12" stroke={color} strokeWidth="0.7" opacity="0.5"/>
      <line x1="3.5" y1="7.5"  x2="9"   y2="7.5"  stroke={color} strokeWidth="0.65" opacity="0.4"/>
      <line x1="3.5" y1="9.5"  x2="9"   y2="9.5"  stroke={color} strokeWidth="0.65" opacity="0.3"/>
      <line x1="3.5" y1="11.5" x2="7.5" y2="11.5" stroke={color} strokeWidth="0.65" opacity="0.2"/>
    </svg>
  );
};

// Ext badge pill
const ExtBadge = ({ ext }) => {
  if (!ext) return null;
  const { color, bg, ring, label } = extCfg(ext);
  return (
    <span className="ml-1.5 inline-flex items-center font-mono leading-none flex-shrink-0"
      style={{
        fontSize: '9px', fontWeight: 500,
        letterSpacing: '0.04em',
        padding: '2px 5px',
        borderRadius: '4px',
        color,
        backgroundColor: bg,
        border: `1px solid ${ring}`,
      }}
    >
      {label}
    </span>
  );
};

/* ═══════════════════════════════════════════════════════════
   CHECKBOX
═══════════════════════════════════════════════════════════ */
const Checkbox = ({ checked, indeterminate, onChange, nodeId }) => {
  const active = checked || indeterminate;
  return (
    <button
      role="checkbox"
      aria-checked={indeterminate ? 'mixed' : checked}
      aria-labelledby={`node-label-${nodeId}`}
      onClick={(e) => { e.stopPropagation(); onChange(); }}
      className="flex-shrink-0 w-[15px] h-[15px] rounded flex items-center justify-center
        transition-all duration-150 focus:outline-none"
      style={{
        background:    active ? '#EA580C' : '#fff',
        border:        active ? '1.5px solid #EA580C' : '1.5px solid #D4D4D8',
        boxShadow:     active ? 'none' : 'inset 0 1px 2px rgba(0,0,0,0.06)',
      }}
    >
      {/* Checkmark */}
      {checked && !indeterminate && (
        <svg width="8" height="7" viewBox="0 0 8 7" fill="none" aria-hidden>
          <path className="tick" d="M1 3.5L3 5.5L7 1"
            stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {/* Dash for indeterminate */}
      {indeterminate && (
        <div className="w-[7px] h-[1.5px] bg-white rounded-full"/>
      )}
    </button>
  );
};

/* ═══════════════════════════════════════════════════════════
   TREE NODE
═══════════════════════════════════════════════════════════ */
const TreeNode = ({
  node, depth,
  expanded, selected, checked, indeterminate,
  onToggle, onSelect, onCheck, onKeyDown,
  showCheckboxes, focusedId, onFocus,
  treeData,
}) => {
  const isOpen     = expanded.has(node.id);
  const isSelected = selected === node.id;
  const isChecked  = checked.has(node.id);
  const isIndet    = indeterminate.has(node.id);
  const isFolder   = node.type === 'folder';
  const INDENT     = 18;          // px per depth level
  const LEFT_PAD   = 10 + depth * INDENT;

  const rowRef = useRef(null);
  useEffect(() => {
    if (focusedId === node.id && rowRef.current) rowRef.current.focus({ preventScroll: true });
  }, [focusedId, node.id]);

  const handleClick = () => {
    onSelect(node.id);
    if (isFolder) onToggle(node.id);
  };

  return (
    <li role="none" className="relative">
      {/* ── Row ─────────────────────────────── */}
      <div
        ref={rowRef}
        role="treeitem"
        id={`node-${node.id}`}
        aria-expanded={isFolder ? isOpen : undefined}
        aria-selected={isSelected}
        tabIndex={focusedId === node.id ? 0 : -1}
        onClick={handleClick}
        onFocus={() => onFocus(node.id)}
        onKeyDown={(e) => onKeyDown(e, node)}
        className={[
          'group relative flex items-center gap-1.5 py-[5px] pr-2.5 rounded-[6px]',
          'cursor-pointer select-none transition-colors duration-100 focus:outline-none',
          isSelected
            ? 'bg-orange-50 text-orange-950'
            : 'text-zinc-800 hover:bg-zinc-100/80',
        ].join(' ')}
        style={{
          paddingLeft: `${LEFT_PAD}px`,
          borderLeft: isSelected ? '2px solid #EA580C' : '2px solid transparent',
        }}
      >
        {/* Expand toggle area */}
        <span className={[
          'flex-shrink-0 w-3.5 h-4 flex items-center justify-center',
          isFolder ? 'text-zinc-400' : 'text-transparent',
        ].join(' ')}>
          {isFolder && <ChevronSvg open={isOpen} />}
        </span>

        {/* Icon */}
        {isFolder ? <FolderSvg open={isOpen} /> : <FileSvg ext={node.ext} />}

        {/* Label */}
        <span
          id={`node-label-${node.id}`}
          className={[
            'flex-1 min-w-0 truncate text-[13px] leading-5',
            isFolder ? 'font-[500]' : 'font-[400]',
            isSelected ? 'text-orange-950' : isFolder ? 'text-zinc-800' : 'text-zinc-700',
          ].join(' ')}
        >
          {node.name}
        </span>

        {/* Ext badge for files */}
        {!isFolder && <ExtBadge ext={node.ext} />}

        {/* Checkbox — always rendered if enabled; faded unless checked/hovered */}
        {showCheckboxes && (
          <span
            className="ml-1 transition-opacity duration-150"
            style={{ opacity: isChecked || isIndet ? 1 : 0 }}
            // Show on hover via group CSS trick — we use onMouseEnter/Leave on parent
            onMouseEnter={(e) => e.currentTarget.style.opacity = '1'}
            onMouseLeave={(e) => {
              if (!isChecked && !isIndet) e.currentTarget.style.opacity = '0';
            }}
          >
            <Checkbox
              checked={isChecked}
              indeterminate={isIndet}
              onChange={() => onCheck(node.id)}
              nodeId={node.id}
            />
          </span>
        )}
      </div>

      {/* ── Children ────────────────────────── */}
      {isFolder && node.children && node.children.length > 0 && (
        <div className={`tree-expand${isOpen ? ' open' : ''}`} role="group" aria-label={node.name}>
          <div className="inner">
            <ul role="none" className="relative" style={{ marginLeft: `${LEFT_PAD + 9}px` }}>
              {/* Indent guide line */}
              <div className="indent-trail" aria-hidden="true" />
              {node.children.map(child => (
                <TreeNode
                  key={child.id}
                  node={child}
                  depth={depth + 1}
                  expanded={expanded}
                  selected={selected}
                  checked={checked}
                  indeterminate={indeterminate}
                  onToggle={onToggle}
                  onSelect={onSelect}
                  onCheck={onCheck}
                  onKeyDown={onKeyDown}
                  showCheckboxes={showCheckboxes}
                  focusedId={focusedId}
                  onFocus={onFocus}
                  treeData={treeData}
                />
              ))}
            </ul>
          </div>
        </div>
      )}
    </li>
  );
};

/* ═══════════════════════════════════════════════════════════
   FILE TREE ROOT
═══════════════════════════════════════════════════════════ */
const FileTree = ({
  data       = TREE_DATA,
  title      = 'project-root',
  showCheckboxes = true,
}) => {
  const [expanded,  setExpanded]  = useState(new Set(['src', 'src/components']));
  const [selected,  setSelected]  = useState(null);
  const [checked,   setChecked]   = useState(new Set());
  const [focusedId, setFocusedId] = useState(null);

  /* ── Flat visible list for keyboard nav ── */
  const flatList = useMemo(
    () => flattenVisible(data, expanded),
    [data, expanded]
  );

  /* ── Indeterminate state ── */
  const indeterminate = useMemo(() => {
    const s = new Set();
    const compute = (node) => {
      if (node.type !== 'folder' || !node.children) return;
      node.children.forEach(compute);
      const leaves = getLeafIds(node);
      if (leaves.length === 0) return;
      const n = leaves.filter(id => checked.has(id)).length;
      if (n > 0 && n < leaves.length) s.add(node.id);
    };
    data.forEach(compute);
    return s;
  }, [data, checked]);

  /* ── Toggle expand ── */
  const handleToggle = useCallback((id) => {
    setExpanded(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }, []);

  /* ── Check / uncheck (with cascade) ── */
  const handleCheck = useCallback((id) => {
    const node = findNode(data, id);
    if (!node) return;
    setChecked(prev => {
      const next = new Set(prev);
      if (node.type === 'folder') {
        const leaves = getLeafIds(node);
        const allOn  = leaves.every(lid => prev.has(lid)) && leaves.length > 0;
        if (allOn) { leaves.forEach(lid => next.delete(lid)); next.delete(id); }
        else        { leaves.forEach(lid => next.add(lid));   next.add(id); }
      } else {
        prev.has(id) ? next.delete(id) : next.add(id);
      }
      return next;
    });
  }, [data]);

  /* ── Keyboard navigation ── */
  const handleKeyDown = useCallback((e, node) => {
    const idx = flatList.findIndex(n => n.id === node.id);
    switch (e.key) {
      case 'ArrowDown':
        e.preventDefault();
        if (idx < flatList.length - 1) {
          setFocusedId(flatList[idx + 1].id);
          setSelected(flatList[idx + 1].id);
        }
        break;
      case 'ArrowUp':
        e.preventDefault();
        if (idx > 0) {
          setFocusedId(flatList[idx - 1].id);
          setSelected(flatList[idx - 1].id);
        }
        break;
      case 'ArrowRight':
        e.preventDefault();
        if (node.type === 'folder') {
          if (!expanded.has(node.id)) handleToggle(node.id);
          else if (node.children?.length) {
            setFocusedId(node.children[0].id);
            setSelected(node.children[0].id);
          }
        }
        break;
      case 'ArrowLeft':
        e.preventDefault();
        if (node.type === 'folder' && expanded.has(node.id)) {
          handleToggle(node.id);
        } else {
          const parentId = findParentId(data, node.id);
          if (parentId) { setFocusedId(parentId); setSelected(parentId); }
        }
        break;
      case 'Enter':
      case ' ':
        e.preventDefault();
        setSelected(node.id);
        if (node.type === 'folder') handleToggle(node.id);
        if (e.key === ' ' && showCheckboxes) handleCheck(node.id);
        break;
      case 'Home':
        e.preventDefault();
        if (flatList.length) { setFocusedId(flatList[0].id); setSelected(flatList[0].id); }
        break;
      case 'End':
        e.preventDefault();
        if (flatList.length) { const last = flatList[flatList.length - 1]; setFocusedId(last.id); setSelected(last.id); }
        break;
    }
  }, [flatList, expanded, handleToggle, handleCheck, showCheckboxes, data]);

  /* ── Stats ── */
  const totalFiles   = useMemo(() => flattenVisible(data, new Set(data.map(n => n.id).concat(
    ...data.flatMap(n => getAllDescendantIds(n))
  ))).filter(n => n.type === 'file').length, [data]);

  const checkedCount = useMemo(
    () => [...checked].filter(id => { const n = findNode(data, id); return n?.type === 'file'; }).length,
    [checked, data]
  );

  const selectedNode = selected ? findNode(data, selected) : null;

  return (
    <div className="w-[400px] bg-white rounded-2xl overflow-hidden flex flex-col"
      style={{ boxShadow: '0 0 0 1px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05)' }}>

      {/* ─── Header ──────────────────────────── */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-zinc-100 bg-zinc-50">
        <div className="flex items-center gap-3">
          {/* macOS traffic lights */}
          <div className="flex gap-1.5" aria-hidden="true">
            <div className="w-3 h-3 rounded-full bg-red-400/90"   />
            <div className="w-3 h-3 rounded-full bg-amber-400/90" />
            <div className="w-3 h-3 rounded-full bg-green-400/90" />
          </div>
          <span className="font-display text-[11px] font-semibold text-zinc-500 tracking-widest uppercase">
            {title}
          </span>
        </div>
        {showCheckboxes && checkedCount > 0 && (
          <span className="font-mono text-[10px] font-medium text-orange-700
            bg-orange-50 border border-orange-200 px-2 py-0.5 rounded-full leading-none">
            {checkedCount} / {totalFiles} selected
          </span>
        )}
      </div>

      {/* ─── Tree scroll area ─────────────────── */}
      <div className="tree-scroll py-1.5 overflow-y-auto" style={{ maxHeight: '520px' }}>
        <ul role="tree" aria-label={title} className="px-1.5">
          {data.map((node) => (
            <TreeNode
              key={node.id}
              node={node}
              depth={0}
              expanded={expanded}
              selected={selected}
              checked={checked}
              indeterminate={indeterminate}
              onToggle={handleToggle}
              onSelect={(id) => { setSelected(id); setFocusedId(id); }}
              onCheck={handleCheck}
              onKeyDown={handleKeyDown}
              showCheckboxes={showCheckboxes}
              focusedId={focusedId}
              onFocus={setFocusedId}
              treeData={data}
            />
          ))}
        </ul>
      </div>

      {/* ─── Footer status bar ────────────────── */}
      <div className="flex items-center justify-between px-4 py-2 border-t border-zinc-100 bg-zinc-50 min-h-[34px]">
        <span className="font-mono text-[10px] text-zinc-400">
          {flatList.length} nodes · {totalFiles} files
        </span>
        {selectedNode && (
          <span className="font-mono text-[10px] text-zinc-500 truncate max-w-[200px]">
            <span className="text-orange-500 mr-1">›</span>
            {selectedNode.name}
          </span>
        )}
      </div>
    </div>
  );
};
